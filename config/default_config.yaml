training:
  mode: "pretrain" # "pretrain" builds a base model; "finetune" adapts a base checkpoint.
  batch_size: 7
  n_batches: 16  # Number of accumulated batches before stepping the optimizer
  n_embd: 1024
  n_head: 8
  n_blocks: 16
  seq_len: 1024
  lr: 0.0006
  dropout_rate: 0.2
  log_inter: 20
  eval_inter: 200
  eval_iter: 10
  max_iter: 100_000
  max_tokens: null   # optional token budget; training stops at min(max_iter, max_tokens)
  dtype: "long"
  tokenizer_type: "gpt2"
  ckpt: "checkpoints/base_ckpt"
  ckpt_config: "checkpoints/base_config.yaml"
  current_shard: 0
  training_duration: 0.0
  training_step: 0
  log_file: "logs/pretrain_log.txt"
  num_workers: 1

finetune:
  enabled: false
  dataset_path: "dataspace/instruction_data.jsonl"
  base_ckpt: "checkpoints/base_ckpt"
  output_ckpt: "checkpoints/instruct_ckpt"
  output_config: "checkpoints/instruct_config.yaml"
  prompt_template: "Instruction:\n{instruction}\n\nResponse:\n"
  response_template: "{response}"
  train_on_prompt: false
  seed: 1337
  shuffle: true

# Configurations used for model inference
inference:
  pretrained_model: "babyGPT_base.llm"
  pretrained_model_config: "babyGPT_base.yaml"
  generate_max_length: 50

# Manifest-backed pretraining data (orthogonal source / transform / materialization / sampling / validation).
# See docs/data-pipeline.md. Build shards once with: python scripts/data.py prepare --config <this file>
data:
  manifest_path: "dataspace/fineweb/manifest.json"

  source:
    type: huggingface
    dataset_name: HuggingFaceFW/fineweb-edu
    config_name: sample-10BT
    split: train
    revision: null            # resolved to an immutable commit SHA when preparing
    text_field: text

  transform:
    add_eot: true
    packing: contiguous
    shard_tokens: 10_000_000
    dtype: uint16

  materialization:
    mode: prepared            # prepared | prefetch | direct
    store_dir: "dataspace/fineweb"
    cache_dir: null
    prefetch_shards: 3
    min_ready_shards: 1
    wait_timeout_s: 300
    tokenizer_workers: 1
    retain_consumed: true

  sampling:
    seed: 1337
    exhaustion: stop          # stop | repeat | wait
    shuffle: none             # none | shard

  validation:
    manifest_path: null
    tokens: 10_000_000
    shards: null
    reset_each_eval: true
